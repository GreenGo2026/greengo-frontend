<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GreenGo Market — Maintenance</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont,
                   "Segoe UI", sans-serif;
      background: #0c3228;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 480px;
      width: 100%;
    }
    .logo {
      font-size: 48px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: clamp(22px, 4vw, 28px);
      font-weight: 800;
      margin-bottom: 8px;
      color: #C9A96E;
    }
    .ar {
      font-size: 18px;
      font-weight: 700;
      color: #C9A96E;
      margin-bottom: 20px;
      direction: rtl;
    }
    p {
      font-size: 15px;
      color: #a0c4a8;
      line-height: 1.7;
      margin-bottom: 24px;
    }
    .whatsapp {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #25D366;
      color: white;
      padding: 14px 28px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
    }
    .eta {
      margin-top: 24px;
      font-size: 13px;
      color: #6a9a7a;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🌿</div>
    <h1>Site en maintenance</h1>
    <p class="ar">الموقع في صيانة مؤقتة</p>
    <p>
      Nous mettons à jour notre catalogue pour vous offrir
      une meilleure expérience. Nous serons de retour
      très bientôt.
    </p>
    <a
      href="https://wa.me/212664500789?text=Bonjour%20GreenGo%2C%20je%20voudrais%20commander"
      class="whatsapp"
    >
      📱 Commander sur WhatsApp
    </a>
    <p class="eta">
      Vous pouvez toujours passer commande directement
      via WhatsApp pendant la maintenance.
    </p>
  </div>
</body>
</html>
